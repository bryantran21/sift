# sift — sources.yaml
# The hand-curated list of ATS job boards the ingest actually fetches. This is the
# INGESTABLE subset: every entry here has a working JSON board and a live adapter.
#
#   company : display name
#   ats     : greenhouse | lever | ashby | smartrecruiters | workable | workday
#   slug    : the board identifier in the ATS URL
#   tier    : 1 (top target) · 2 · 3  — feeds relevance scoring (1→25, 2→15, 3→5 pts)
#   tags    : quant | big-tech | fortune-500
#   enabled : optional, defaults true — set false to mute a board without deleting it
#
# The broader company universe you're organizing (quant / big-tech / fortune-500,
# including companies that aren't ingestable yet) lives in src/data/companies.ts and
# in the company-browser UI. Only 'live' companies from there belong in this file.
# Slugs and job counts (comments) were confirmed against the Greenhouse API 2026-07-20.

